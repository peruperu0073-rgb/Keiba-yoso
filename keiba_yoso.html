<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🏇 Nami's 競馬予想システム</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700;900&family=Bebas+Neue&display=swap');

  :root {
    --bg: #0a0a0f;
    --surface: #12121a;
    --surface2: #1a1a26;
    --border: #2a2a3d;
    --accent: #c9a84c;
    --accent2: #e8c97a;
    --red: #e05252;
    --blue: #5299e0;
    --green: #52c97a;
    --purple: #9b72cf;
    --text: #e8e8f0;
    --text2: #9898b0;
    --text3: #5a5a72;
    --gold: #ffd700;
    --silver: #c0c0c0;
    --bronze: #cd7f32;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans JP', sans-serif;
    min-height: 100vh;
    font-size: 14px;
  }

  /* ===== HEADER ===== */
  .header {
    background: linear-gradient(135deg, #0d0d18 0%, #1a1228 50%, #0d0d18 100%);
    border-bottom: 1px solid var(--accent);
    padding: 16px 16px 12px;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 4px 20px rgba(201,168,76,0.15);
  }

  .header-title {
    font-family: 'Bebas Neue', cursive;
    font-size: 28px;
    letter-spacing: 3px;
    color: var(--accent2);
    text-shadow: 0 0 20px rgba(201,168,76,0.4);
  }

  .header-sub {
    font-size: 10px;
    color: var(--text3);
    letter-spacing: 2px;
    margin-top: 2px;
  }

  /* ===== TABS ===== */
  .tabs {
    display: flex;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    overflow-x: auto;
    scrollbar-width: none;
    -webkit-overflow-scrolling: touch;
  }
  .tabs::-webkit-scrollbar { display: none; }

  .tab {
    flex: 1;
    min-width: 80px;
    min-height: 44px;
    padding: 12px 8px;
    text-align: center;
    font-size: 12px;
    color: var(--text3);
    cursor: pointer;
    border: none;
    border-bottom: 2px solid transparent;
    border-radius: 0;
    background: transparent;
    font-family: 'Noto Sans JP', sans-serif;
    transition: all 0.2s;
    white-space: nowrap;
    -webkit-tap-highlight-color: rgba(201,168,76,0.2);
    touch-action: manipulation;
    user-select: none;
    -webkit-user-select: none;
  }
  .tab.active {
    color: var(--accent2);
    border-bottom-color: var(--accent);
    background: rgba(201,168,76,0.05);
  }
  .tab:hover { color: var(--text2); }

  /* ===== PANELS ===== */
  .panel { display: none; padding: 16px; }
  .panel.active { display: block; }

  /* ===== SECTION ===== */
  .section {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px;
    margin-bottom: 16px;
  }

  .section-title {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 2px;
    color: var(--accent);
    text-transform: uppercase;
    margin-bottom: 14px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .section-title::after {
    content: '';
    flex: 1;
    height: 1px;
    background: linear-gradient(90deg, var(--accent), transparent);
  }

  /* ===== FORM ===== */
  .form-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }
  .form-grid.cols3 { grid-template-columns: 1fr 1fr 1fr; }
  .form-grid.cols1 { grid-template-columns: 1fr; }

  .form-group { display: flex; flex-direction: column; gap: 5px; }
  .form-group.full { grid-column: 1 / -1; }

  label {
    font-size: 10px;
    color: var(--text3);
    font-weight: 500;
    letter-spacing: 1px;
  }

  input, select, textarea {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-size: 13px;
    font-family: 'Noto Sans JP', sans-serif;
    padding: 9px 12px;
    transition: border-color 0.2s;
    outline: none;
    width: 100%;
  }
  input:focus, select:focus, textarea:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 2px rgba(201,168,76,0.1);
  }
  select option { background: var(--surface2); }
  textarea { resize: vertical; min-height: 70px; }

  /* ===== BUTTON ===== */
  .btn {
    padding: 11px 20px;
    border-radius: 8px;
    border: none;
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 1px;
  }
  .btn-primary {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: #0a0a0f;
    width: 100%;
  }
  .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 4px 16px rgba(201,168,76,0.3); }
  .btn-secondary {
    background: var(--surface2);
    color: var(--text2);
    border: 1px solid var(--border);
  }
  .btn-danger {
    background: rgba(224,82,82,0.15);
    color: var(--red);
    border: 1px solid rgba(224,82,82,0.3);
  }
  .btn-sm { padding: 6px 12px; font-size: 11px; }

  /* ===== HORSE CARD ===== */
  .horse-card {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px;
    margin-bottom: 10px;
    position: relative;
    transition: border-color 0.3s;
  }
  .horse-card.has-flag {
    border-color: rgba(201,168,76,0.5);
    box-shadow: 0 0 12px rgba(201,168,76,0.1);
  }

  .horse-header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 10px;
    flex-wrap: wrap;
  }

  .waku-badge {
    width: 28px;
    height: 28px;
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 900;
    font-size: 13px;
    flex-shrink: 0;
  }

  .horse-name-big {
    font-size: 16px;
    font-weight: 700;
    flex: 1;
  }

  .badges { display: flex; flex-wrap: wrap; gap: 4px; }

  .badge {
    font-size: 10px;
    padding: 2px 8px;
    border-radius: 20px;
    font-weight: 700;
    letter-spacing: 0.5px;
  }
  .badge-kyakushitsu { background: rgba(82,153,224,0.2); color: #7ab8f0; border: 1px solid rgba(82,153,224,0.4); }
  .badge-score-high { background: rgba(201,168,76,0.2); color: var(--accent2); border: 1px solid rgba(201,168,76,0.4); }
  .badge-score-mid { background: rgba(82,201,122,0.15); color: #7ae8a0; border: 1px solid rgba(82,201,122,0.3); }
  .badge-score-low { background: rgba(90,90,114,0.3); color: var(--text3); border: 1px solid var(--border); }
  .badge-ana { background: linear-gradient(135deg, rgba(201,168,76,0.3), rgba(232,201,122,0.3)); color: var(--gold); border: 1px solid rgba(201,168,76,0.6); animation: glowPulse 2s infinite; }
  .badge-rank { background: rgba(155,114,207,0.2); color: #c4a0f0; border: 1px solid rgba(155,114,207,0.4); }

  @keyframes glowPulse {
    0%, 100% { box-shadow: 0 0 6px rgba(201,168,76,0.4); }
    50% { box-shadow: 0 0 14px rgba(201,168,76,0.8); }
  }

  /* ===== SCORE BAR ===== */
  .score-row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 6px;
    font-size: 11px;
  }
  .score-label { color: var(--text3); width: 90px; flex-shrink: 0; }
  .score-bar-bg {
    flex: 1;
    height: 6px;
    background: var(--border);
    border-radius: 3px;
    overflow: hidden;
  }
  .score-bar-fill {
    height: 100%;
    border-radius: 3px;
    transition: width 0.6s ease;
  }
  .score-val { color: var(--text2); width: 24px; text-align: right; flex-shrink: 0; font-weight: 700; }

  /* ===== KEIKA TABLE ===== */
  .keika-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 11px;
    margin-top: 8px;
  }
  .keika-table th {
    background: var(--bg);
    color: var(--text3);
    padding: 6px 4px;
    text-align: center;
    font-weight: 500;
    border-bottom: 1px solid var(--border);
    font-size: 10px;
  }
  .keika-table td {
    padding: 7px 4px;
    text-align: center;
    border-bottom: 1px solid rgba(42,42,61,0.5);
    vertical-align: middle;
  }
  .keika-table tr:hover td { background: rgba(201,168,76,0.03); }

  .rank-circle {
    display: inline-flex;
    width: 22px;
    height: 22px;
    border-radius: 50%;
    align-items: center;
    justify-content: center;
    font-weight: 700;
    font-size: 11px;
  }
  .rank-1 { background: rgba(255,215,0,0.2); color: var(--gold); border: 1px solid rgba(255,215,0,0.5); }
  .rank-2 { background: rgba(192,192,192,0.2); color: var(--silver); border: 1px solid rgba(192,192,192,0.4); }
  .rank-3 { background: rgba(205,127,50,0.2); color: var(--bronze); border: 1px solid rgba(205,127,50,0.4); }
  .rank-other { background: var(--surface); color: var(--text2); border: 1px solid var(--border); }

  /* ===== ANA FLAGS ===== */
  .ana-flags {
    display: flex;
    flex-wrap: wrap;
    gap: 4px;
    margin-top: 8px;
  }
  .ana-flag {
    font-size: 10px;
    padding: 3px 8px;
    background: rgba(255,215,0,0.1);
    border: 1px solid rgba(255,215,0,0.3);
    border-radius: 4px;
    color: var(--gold);
  }

  /* ===== TENKAI ===== */
  .tenkai-box {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px;
    margin-top: 12px;
  }
  .tenkai-title {
    font-size: 10px;
    color: var(--accent);
    font-weight: 700;
    letter-spacing: 2px;
    margin-bottom: 8px;
  }

  /* ===== SUMMARY ===== */
  .summary-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 16px;
  }
  .summary-card {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px;
    text-align: center;
  }
  .summary-card-label { font-size: 10px; color: var(--text3); margin-bottom: 6px; }
  .summary-card-val { font-size: 22px; font-weight: 900; color: var(--accent2); }

  /* ===== RANKING LIST ===== */
  .ranking-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    margin-bottom: 8px;
  }
  .ranking-pos {
    font-family: 'Bebas Neue', cursive;
    font-size: 22px;
    width: 30px;
    text-align: center;
    flex-shrink: 0;
  }
  .ranking-info { flex: 1; }
  .ranking-name { font-weight: 700; font-size: 15px; }
  .ranking-meta { font-size: 10px; color: var(--text3); margin-top: 2px; }
  .ranking-score {
    font-size: 20px;
    font-weight: 900;
    color: var(--accent2);
  }

  /* ===== SAVED RACES ===== */
  .saved-race-item {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px;
    margin-bottom: 8px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
  }
  .saved-race-info { flex: 1; }
  .saved-race-name { font-weight: 700; }
  .saved-race-meta { font-size: 11px; color: var(--text3); margin-top: 2px; }
  .btn-group { display: flex; gap: 6px; }

  /* ===== MODAL ===== */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.8);
    z-index: 200;
    align-items: center;
    justify-content: center;
    padding: 16px;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--surface);
    border: 1px solid var(--accent);
    border-radius: 16px;
    padding: 20px;
    width: 100%;
    max-width: 500px;
    max-height: 85vh;
    overflow-y: auto;
  }
  .modal-title {
    font-size: 14px;
    font-weight: 700;
    color: var(--accent2);
    margin-bottom: 16px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .modal-close { cursor: pointer; color: var(--text3); font-size: 20px; }

  /* ===== CORNER INPUT ===== */
  .corner-inputs {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 6px;
  }
  .corner-label { font-size: 10px; color: var(--text3); text-align: center; margin-bottom: 2px; }

  /* ===== PACE INDICATOR ===== */
  .pace-indicator {
    display: flex;
    gap: 8px;
    margin-top: 8px;
  }
  .pace-dot {
    flex: 1;
    padding: 8px 4px;
    text-align: center;
    border-radius: 6px;
    font-size: 11px;
    font-weight: 700;
    cursor: pointer;
    border: 2px solid transparent;
    transition: all 0.2s;
  }
  .pace-dot.slow { background: rgba(82,201,122,0.15); color: #7ae8a0; }
  .pace-dot.mid { background: rgba(201,168,76,0.15); color: var(--accent2); }
  .pace-dot.high { background: rgba(224,82,82,0.15); color: #f08080; }
  .pace-dot.selected { border-color: currentColor; }

  /* ===== EMPTY STATE ===== */
  .empty-state {
    text-align: center;
    padding: 40px 20px;
    color: var(--text3);
  }
  .empty-state-icon { font-size: 40px; margin-bottom: 12px; }
  .empty-state-text { font-size: 13px; }

  /* ===== DIVIDER ===== */
  .divider {
    height: 1px;
    background: var(--border);
    margin: 16px 0;
  }

  /* ===== TENKAI FLOW ===== */
  .flow-row {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    margin-bottom: 6px;
    flex-wrap: wrap;
  }
  .flow-chip {
    padding: 4px 10px;
    border-radius: 20px;
    font-size: 11px;
    font-weight: 700;
  }
  .flow-arrow { color: var(--text3); }

  /* ===== TOAST ===== */
  .toast {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%) translateY(60px);
    background: var(--accent);
    color: #0a0a0f;
    padding: 10px 20px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 700;
    z-index: 300;
    transition: transform 0.3s ease;
    white-space: nowrap;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }

  /* ===== SCROLLBAR ===== */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .mt8 { margin-top: 8px; }
  .mt12 { margin-top: 12px; }
  .flex-gap { display: flex; gap: 8px; }
</style>
</head>
<body>

<div class="header">
  <div class="header-title">🏇 KEIBA YOSO</div>
  <div class="header-sub">Nami's 競馬予想システム</div>
</div>

<div class="tabs">
  <button class="tab active" onclick="switchTab('input')">📝 入力</button>
  <button class="tab" onclick="switchTab('result')">📊 結果</button>
  <button class="tab" onclick="switchTab('tenkai')">🌀 展開</button>
  <button class="tab" onclick="switchTab('saved')">💾 保存</button>
</div>

<!-- ==================== INPUT TAB ==================== -->
<div class="panel active" id="tab-input" style="display:block">

  <!-- レース情報 -->
  <div class="section">
    <div class="section-title">🏟 レース情報</div>
    <div class="form-grid">
      <div class="form-group full">
        <label>レース名</label>
        <input type="text" id="race-name" placeholder="例：大阪杯 (G1)">
      </div>
      <div class="form-group">
        <label>競馬場</label>
        <select id="race-course">
          <option value="">選択</option>
          <option value="tokyo">東京（525.9m）</option>
          <option value="nakayama">中山（310m）</option>
          <option value="hanshin_outer">阪神・外（473.6m）</option>
          <option value="hanshin_inner">阪神・内（356.5m）</option>
          <option value="kyoto_outer">京都・外（404m）</option>
          <option value="kyoto_inner">京都・内（328m）</option>
          <option value="chukyo">中京（412.5m）</option>
          <option value="niigata_outer">新潟・外（659m）</option>
          <option value="niigata_inner">新潟・内（359m）</option>
          <option value="fukushima">福島（292m）</option>
          <option value="kokura">小倉（293m）</option>
          <option value="sapporo">札幌（266.1m）</option>
          <option value="hakodate">函館（262m）</option>
        </select>
      </div>
      <div class="form-group">
        <label>距離</label>
        <select id="race-distance">
          <option value="">選択</option>
          <option value="1200">1200m</option>
          <option value="1400">1400m</option>
          <option value="1600">1600m</option>
          <option value="1800">1800m</option>
          <option value="2000">2000m</option>
          <option value="2200">2200m</option>
          <option value="2400">2400m</option>
          <option value="2500">2500m</option>
          <option value="3000">3000m</option>
          <option value="3200">3200m</option>
          <option value="3600">3600m</option>
        </select>
      </div>
      <div class="form-group">
        <label>芝 / ダート</label>
        <select id="race-surface">
          <option value="turf">芝</option>
          <option value="dirt">ダート</option>
        </select>
      </div>
      <div class="form-group">
        <label>グレード</label>
        <select id="race-grade">
          <option value="">選択</option>
          <option value="G1">G1</option>
          <option value="G2">G2</option>
          <option value="G3">G3</option>
          <option value="JP">JPn(JpnI〜III)</option>
          <option value="L">L（リステッド）</option>
          <option value="OP">OP（オープン）</option>
          <option value="3win">3勝クラス</option>
          <option value="2win">2勝クラス</option>
          <option value="1win">1勝クラス</option>
          <option value="maiden">未勝利</option>
        </select>
      </div>
      <div class="form-group">
        <label>馬場状態</label>
        <select id="race-baba">
          <option value="good">良</option>
          <option value="yayashige">稍重</option>
          <option value="heavy">重</option>
          <option value="furyou">不良</option>
        </select>
      </div>
      <div class="form-group">
        <label>クッション値</label>
        <input type="number" id="race-cushion" placeholder="例：9.8" step="0.1" min="0" max="15">
      </div>
      <div class="form-group">
        <label>開幕何日目</label>
        <select id="race-kaibaku">
          <option value="1">1〜2日目（超開幕）</option>
          <option value="3">3〜4日目</option>
          <option value="5" selected>5〜6日目</option>
          <option value="7">7〜8日目（中盤）</option>
          <option value="9">9日目以降（荒れ馬場）</option>
        </select>
      </div>
      <div class="form-group">
        <label>逃げ馬の数</label>
        <select id="race-nigemas">
          <option value="0">0頭（スロー濃厚）</option>
          <option value="1" selected>1頭（標準）</option>
          <option value="2">2頭（ミドル）</option>
          <option value="3">3頭以上（ハイ濃厚）</option>
        </select>
      </div>
      <div class="form-group">
        <label>出走頭数</label>
        <input type="number" id="race-tosu" placeholder="例：16" min="3" max="18" value="16">
      </div>
      <div class="form-group">
        <label>レース日</label>
        <input type="date" id="race-date">
      </div>
    </div>
  </div>

  <!-- 出走馬追加 -->
  <div class="section">
    <div class="section-title">🐴 出走馬データ</div>
    <div id="horse-slots"></div>
  </div>

  <button class="btn btn-primary" onclick="analyzeAll()" style="margin-bottom:16px">
    🔍 分析・印をつける
  </button>
</div>

<!-- ==================== RESULT TAB ==================== -->
<div class="panel" id="tab-result" style="display:none">
  <div id="result-content">
    <div class="empty-state">
      <div class="empty-state-icon">📊</div>
      <div class="empty-state-text">「分析・印をつける」を押してね</div>
    </div>
  </div>
</div>

<!-- ==================== TENKAI TAB ==================== -->
<div class="panel" id="tab-tenkai" style="display:none">
  <div id="tenkai-content">
    <div class="empty-state">
      <div class="empty-state-icon">🌀</div>
      <div class="empty-state-text">「分析・印をつける」を押してね</div>
    </div>
  </div>
</div>

<!-- ==================== SAVED TAB ==================== -->
<div class="panel" id="tab-saved" style="display:none">

<script>
// ===== STATE =====
let horses = [];
let raceAnalyzed = false;

const WAKU_COLORS = {
  1: ['#fff','#111'], 2: ['#111','#fff'],
  3: ['#e05252','#fff'], 4: ['#5299e0','#fff'],
  5: ['#f0c040','#111'], 6: ['#52c97a','#111'],
  7: ['#e08050','#fff'], 8: ['#c070c0','#fff']
};

const COURSE_DATA = {
  tokyo:        { straight: 525.9, type: 'wide',  slope: false, corners: 4, name: '東京' },
  nakayama:     { straight: 310,   type: 'small', slope: true,  corners: 4, name: '中山' },
  hanshin_outer:{ straight: 473.6, type: 'mid',   slope: true,  corners: 4, name: '阪神外' },
  hanshin_inner:{ straight: 356.5, type: 'small', slope: true,  corners: 6, name: '阪神内' },
  kyoto_outer:  { straight: 404,   type: 'mid',   slope: false, corners: 4, name: '京都外' },
  kyoto_inner:  { straight: 328,   type: 'small', slope: false, corners: 4, name: '京都内' },
  chukyo:       { straight: 412.5, type: 'mid',   slope: false, corners: 4, name: '中京' },
  niigata_outer:{ straight: 659,   type: 'wide',  slope: false, corners: 2, name: '新潟外' },
  niigata_inner:{ straight: 359,   type: 'small', slope: false, corners: 4, name: '新潟内' },
  fukushima:    { straight: 292,   type: 'small', slope: false, corners: 4, name: '福島' },
  kokura:       { straight: 293,   type: 'small', slope: false, corners: 4, name: '小倉' },
  sapporo:      { straight: 266.1, type: 'small', slope: false, corners: 4, name: '札幌' },
  hakodate:     { straight: 262,   type: 'small', slope: false, corners: 4, name: '函館' },
  overseas:     { straight: 400,   type: 'mid',   slope: false, corners: 4, name: '海外' },
};

// ===== TABS =====
function switchTab(name) {
  const names = ['input','result','tenkai','saved'];

  // タブのアクティブ状態
  document.querySelectorAll('.tab').forEach((t, i) => {
    t.classList.toggle('active', names[i] === name);
  });

  // パネルの表示・非表示を style.display で直接制御（iOS Safari対策）
  names.forEach(n => {
    const el = document.getElementById('tab-' + n);
    if (el) {
      el.classList.remove('active');
      el.style.display = (n === name) ? 'block' : 'none';
    }
  });

  if (name === 'saved') { renderSaved(); renderHorseDBList(); }
  if (name === 'input') renderHorseSlots();
}

// ===== TOAST =====
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

// ===== MODAL =====
let currentSlotNum = null;

function openHorseModal(idx, slotNum) {
  document.getElementById('horse-modal').classList.add('open');
  document.getElementById('edit-horse-idx').value = idx !== undefined ? idx : -1;
  currentSlotNum = slotNum || null;
  document.getElementById('modal-title-text').textContent = idx !== undefined ? '🐴 出走馬を編集' : `🐴 ${slotNum ? slotNum+'番 ' : ''}出走馬を追加`;

  document.getElementById('keika-entries').innerHTML = '';
  keikaCount = 0;
  document.getElementById('jisseki-entries').innerHTML = '';
  jissekiCount = 0;

  if (idx !== undefined) {
    const h = horses[idx];
    if (!h) { clearModalForm(); addKeikaRow(); return; }
    document.getElementById('h-waku').value   = h.waku;
    document.getElementById('h-umaban').value = h.umaban;
    document.getElementById('h-sex').value    = h.sex || (h.age?.replace(/[0-9]/g,'') || '牡');
    document.getElementById('h-agenum').value = h.age?.replace(/[^0-9]/g,'') || h.age || '4';
    document.getElementById('h-name').value   = h.name;
    document.getElementById('h-jockey').value = h.jockey;
    document.getElementById('h-weight').value = h.weight;
    document.getElementById('h-sire').value   = h.sire;
    document.getElementById('h-jushorenh').value  = h.jushoRenh || 'auto';
    document.getElementById('h-course-exp').value = h.courseExp || 'auto';
    document.getElementById('h-dist-exp').value   = h.distExp || 'auto';
    document.getElementById('h-memo').value   = h.memo || '';
    document.getElementById('h-rest').value   = h.rest || 'normal';
    if (h.keika && h.keika.length) {
      h.keika.forEach(k => addKeikaRow(k));
    } else { addKeikaRow(); }
    if (h.jisseki && h.jisseki.length) {
      h.jisseki.forEach(j => addJissekiRow(j));
    }
  } else {
    clearModalForm();
    if (slotNum) {
      document.getElementById('h-umaban').value = slotNum;
    }
    addKeikaRow();
  }
}

function closeHorseModal() {
  document.getElementById('horse-modal').classList.remove('open');
}

function clearModalForm() {
  ['h-name','h-jockey','h-weight','h-memo','h-umaban'].forEach(id => {
    document.getElementById(id).value = '';
  });
  document.getElementById('h-waku').value    = '1';
  document.getElementById('h-sex').value     = '牡';
  document.getElementById('h-agenum').value  = '4';
  document.getElementById('h-sire').value    = '';
  document.getElementById('h-jushorenh').value = 'auto';
  document.getElementById('h-course-exp').value = 'auto';
  document.getElementById('h-dist-exp').value   = 'auto';
  document.getElementById('h-rest').value    = 'normal';
}

// 数値入力フィールドを安全に取得（空・0・未入力はnull）
function getNumericInput(id) {
  const el = document.getElementById(id);
  if (!el) return null;
  const raw = el.value;
  if (raw === '' || raw === null || raw === undefined) return null;
  const n = parseFloat(raw);
  if (isNaN(n) || n <= 0) return null;
  return n;
}

// ===== 加点テーブル（距離適性・重賞実績共通） =====
const KAITEN_TABLE = {
  G1:  { 1: 15, 2: 12, 3: 10 },
  G2:  { 1: 10, 2:  8, 3:  6 },
  G3:  { 1:  7, 2:  5, 3:  3 },
  JP:  { 1:  7, 2:  5, 3:  3 },
  L:   { 1:  4, 2:  2, 3:  1 },
  OP:  { 1:  4, 2:  2, 3:  1 },
  '3勝':{ 1: 2, 2:  1, 3:  0 },
  '2勝':{ 1: 2, 2:  1, 3:  0 },
  '1勝':{ 1: 2, 2:  1, 3:  0 },
};

function calcDistScore(keika, targetDist) {
  if (!targetDist) return 0;
  const td = parseInt(targetDist);
  let score = 0;
  (keika || []).forEach(k => {
    if (!k.pastDist || parseInt(k.pastDist) !== td) return;
    const pts = KAITEN_TABLE[k.grade];
    if (pts && k.rank >= 1 && k.rank <= 3) score += (pts[k.rank] || 0);
  });
  return score;
}

function calcJushoScore(keika) {
  let score = 0;
  (keika || []).forEach(k => {
    const pts = KAITEN_TABLE[k.grade];
    if (pts && k.rank >= 1 && k.rank <= 3) score += (pts[k.rank] || 0);
  });
  return score;
}

// Rtスコア（過去走の最高Rtで判定）
// 距離適性（好走実績方式・上限6pt）
function calcNewDistScore(keika, targetDist) {
  if (!targetDist) return 0;
  const td = parseInt(targetDist);
  const validKeika = (keika || []).filter(k => k.pastDist && k.pastDist !== '');
  if (!validKeika.length) return 0;
  const sameDist = validKeika.filter(k => parseInt(k.pastDist) === td);
  if (sameDist.some(k => k.rank === 1)) return 6;
  if (sameDist.some(k => k.rank <= 3)) return 4;
  if (validKeika.some(k => parseInt(k.pastDist) > td && k.rank === 1)) return 3;
  if (sameDist.length > 0) return 1;
  return 0;
}

// Rtスコア（ランク別×走数加点方式・青天井）
function calcRtScore(keika) {
  if (!keika || !keika.length) return 0;
  const rtPerRun = (k) => {
    if (k.rt == null || k.rt <= 0) return 0;
    if (k.rt >= 120) return 10;
    if (k.rt >= 115) return 7;
    if (k.rt >= 110) return 5;
    if (k.rt >= 105) return 3;
    return 1;
  };
  return keika.reduce((sum, k) => sum + rtPerRun(k), 0);
}

// 上がりタイム⚡判定（全体上がりより速い走）
// 距離別⚡上がり基準
function getAgariThreshold(distM) {
  const d = parseInt(distM) || 0;
  if (d <= 1400) return 33.5;
  if (d <= 2400) return 33.0;
  return 33.5; // 3000m以上
}

// ⚡判定：絶対値基準 OR 全体上がりとの比較（どちらかでOK）
function isAgariFlash(k) {
  if (k.agari == null) return false;
  const threshold = getAgariThreshold(k.pastDist);
  const absFlash = k.agari <= threshold;
  const relFlash = k.agariAll != null && k.agari < k.agariAll - 0.5;
  return absFlash || relFlash;
}

function getAgariFlashCount(keika) {
  return (keika || []).filter(k => isAgariFlash(k)).length;
}

// 距離変化フラグ判定
function getDistChangeFlag(keika, targetDist) {
  if (!targetDist || !keika || !keika.length) return null;
  const td = parseInt(targetDist);
  const validKeika = keika.filter(k => k.pastDist && k.pastDist !== '');
  if (validKeika.length < 3) return null;

  const longer  = validKeika.filter(k => parseInt(k.pastDist) > td).length;
  const shorter = validKeika.filter(k => parseInt(k.pastDist) < td).length;

  if (longer >= 3) return 'down';   // 距離短縮傾向
  if (shorter >= 3) return 'up';    // 距離延長傾向
  return null;
}

// ===== ローテ間隔計算 =====
function calcRoteWeeks(keika, raceDate) {
  if (!raceDate || !keika || !keika.length) return null;
  const latestKeika = keika.find(k => k.raceDate);
  if (!latestKeika) return null;
  const d1 = new Date(latestKeika.raceDate);
  const d2 = new Date(raceDate);
  if (isNaN(d1) || isNaN(d2)) return null;
  const diffDays = Math.round((d2 - d1) / (1000 * 60 * 60 * 24));
  return Math.floor(diffDays / 7);
}

function getRoteLabel(weeks) {
  if (weeks === null) return null;
  if (weeks <= 8)  return { label: '通常ローテ', type: 'normal' };
  if (weeks <= 16) return { label: 'やや間隔あき', type: 'medium' };
  return { label: '休み明け', type: 'long' };
}

// ===== 馬データベース =====
let horseDB = {}; // { "馬名": horseData }

function exportHorseDB() {
  if (!Object.keys(horseDB).length && !horses.length) {
    showToast('馬データがないわ！');
    return;
  }
  // 現在の出走馬もDBに追加
  horses.forEach(h => { if (h.name) horseDB[h.name] = h; });
  const exportData = {
    app: 'Nami競馬予想システム',
    type: 'horseDB',
    exportedAt: new Date().toLocaleString('ja-JP'),
    horses: horseDB
  };
  const blob = new Blob([JSON.stringify(exportData, null, 2)], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  const date = new Date().toISOString().slice(0,10).replace(/-/g,'');
  a.href = url;
  a.download = `keiba_horses_${date}.json`;
  a.click();
  URL.revokeObjectURL(url);
  showToast(`${Object.keys(horseDB).length}頭の馬データを書き出したわ！`);
}

function importHorseDB(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (e) => {
    try {
      const data = JSON.parse(e.target.result);
      if (data.type !== 'horseDB' || !data.horses) throw new Error('馬データファイルじゃないわ');
      horseDB = {...horseDB, ...data.horses};
      showToast(`${Object.keys(data.horses).length}頭の馬データを読み込んだわ！`);
      renderHorseSlots();
    } catch(err) {
      showToast('読み込みエラー：' + err.message);
    }
    event.target.value = '';
  };
  reader.readAsText(file, 'UTF-8');
}

function loadHorseFromDB(name, slotNum) {
  const h = horseDB[name];
  if (!h) { showToast(`${name}のデータが見つからないわ`); return; }
  // A案：直近5走を詳細に、それ以前は実績欄に自動圧縮
  const horseToLoad = {...h};
  if (h.keika && h.keika.length > 5) {
    const recent5 = h.keika.slice(0, 5);
    const older = h.keika.slice(5);
    // 古い走を実績欄に圧縮（グレード・着順・コース・距離のみ）
    const compressed = older.map(k => ({
      raceName: k.raceName || '',
      grade: k.grade || '',
      rank: k.rank || 1,
      pastCourse: k.pastCourse || '',
      pastDist: k.pastDist || '',
    }));
    horseToLoad.keika = recent5;
    horseToLoad.jisseki = [...(h.jisseki || []), ...compressed];
  }
  // スロット番号の枠番・馬番をセット
  horseToLoad.umaban = slotNum;
  horses[slotNum - 1] = horseToLoad;
  renderHorseSlots();
  showToast(`${name}を${slotNum}番に読み込んだわ！`);
}

function autoDetectJusho(manualVal, keika) {
  if (manualVal !== 'auto') return manualVal;
  const rentai = (keika || []).filter(k => k.rank <= 2).map(k => ({g: k.grade, r: k.rank}));
  if (rentai.some(x => x.g === 'G1' && x.r === 1)) return 'g1';
  if (rentai.some(x => x.g === 'G1' && x.r === 2)) return 'g1_2nd';
  if (rentai.some(x => ['G2','G3'].includes(x.g))) return 'g23';
  if (rentai.some(x => ['L','OP','JP'].includes(x.g))) return 'op';
  const fukusho = (keika || []).filter(k => k.rank === 3).map(k => k.grade);
  if (fukusho.some(g => g === 'G1')) return 'g1_3rd';
  if (fukusho.some(g => ['G2','G3'].includes(g))) return 'g23_3rd';
  if (fukusho.some(g => ['L','OP','JP'].includes(g))) return 'op_3rd';
  return 'none';
}

// 重賞フラグを全種類チェック（複数フラグ対応）
function getJushoFlags(keika) {
  const flags = [];
  const k = keika || [];
  if (k.some(x => x.grade === 'G1' && x.rank === 1))                      flags.push('🏆G1勝ち鞍');
  if (k.some(x => x.grade === 'G1' && x.rank === 2))                      flags.push('🥈G1・2着実績');
  if (k.some(x => x.grade === 'G1' && x.rank === 3))                      flags.push('🥉G1・3着実績');
  if (k.some(x => ['G2','G3'].includes(x.grade) && x.rank <= 2))          flags.push('🏅重賞連対あり');
  if (k.some(x => ['G2','G3'].includes(x.grade) && x.rank === 3))         flags.push('🪙重賞3着あり');
  if (k.some(x => ['L','OP','JP'].includes(x.grade) && x.rank <= 2))      flags.push('🔥OP/L連対あり');
  if (k.some(x => ['L','OP','JP'].includes(x.grade) && x.rank === 3))     flags.push('🔥OP/L・3着実績');
  return flags;
}

function autoDetectCourseExp(manualVal, keika, targetCourse) {
  if (manualVal !== 'auto') return manualVal;
  if (!targetCourse) return 'none';
  const targetInfo = COURSE_DATA[targetCourse];

  // pastCourseが未選択（空欄）のものはスキップ
  const validKeika = (keika || []).filter(k => k.pastCourse && k.pastCourse !== '');
  if (!validKeika.length) return 'none';

  const matches = validKeika.filter(k => k.pastCourse === targetCourse);
  if (matches.some(k => k.rank === 1)) return 'win';
  if (matches.some(k => k.rank <= 3)) return 'placed';
  if (matches.length > 0) return 'ran';

  // 似たコース（直線長さ±50m以内）
  if (targetInfo) {
    const similar = validKeika.some(k => {
      const ci = COURSE_DATA[k.pastCourse];
      return ci && Math.abs(ci.straight - targetInfo.straight) <= 50;
    });
    if (similar) return 'similar';
  }
  return 'none';
}

function autoDetectDistExp(manualVal, keika, targetDist) {
  if (manualVal !== 'auto') return manualVal;
  if (!targetDist) return 'none';
  const td = parseInt(targetDist);
  if (isNaN(td)) return 'none';

  // pastDistが未選択（空欄）のものはスキップ
  const validKeika = (keika || []).filter(k => k.pastDist && k.pastDist !== '');
  if (!validKeika.length) return 'none';

  const matches = validKeika.filter(k => parseInt(k.pastDist) === td);
  if (matches.some(k => k.rank === 1)) return 'win';
  if (matches.some(k => k.rank <= 3)) return 'placed';
  if (matches.length > 0) return 'ran';

  // 今回より長い距離で勝ち
  const longerWin = validKeika.some(k => parseInt(k.pastDist) > td && k.rank === 1);
  if (longerWin) return 'longer';
  return 'none';
}

    ['k'+idx+'-dist',      found.pastDist],
    ['k'+idx+'-baba',      found.pastBaba],
  ];
  fields.forEach(([id, val]) => {

    sire:      document.getElementById('h-sire').value,
    jushoRenh,
    courseExp,
    distExp,
    memo:      document.getElementById('h-memo').value,
    rest:      document.getElementById('h-rest').value,
    keika,

  };

  horseDB[name] = {...horse};

  closeHorseModal();
  renderHorseSlots();

// ===== HORSE ANALYSIS =====
function analyzeHorse(h, race, course) {
  let scores = { course: 0, dist: 0, blood: 0, kyakushitsu: 0, rt: 0 };
  let plusFlags  = [];
  let minusFlags = [];
  let noteFlags  = [];

  const allKeika = [...(h.keika || []), ...(h.jisseki || [])];

  // --- 1. コース適性（上限10pt・jisseki込み） ---
  const courseExp = autoDetectCourseExp('auto', allKeika, race.course);
  const courseScoreMap = { win: 10, placed: 7, ran: 4, similar: 2, none: 0 };
  scores.course = courseScoreMap[courseExp] || 0;
  const hasCourseExp = allKeika.some(k => k.pastCourse && k.pastCourse === race.course);
  if (!hasCourseExp && race.course) minusFlags.push('🌀コース未経験');

  // --- 2. 距離適性（上限6pt・jisseki込み） ---
  scores.dist = calcNewDistScore(allKeika, race.distance);
  const hasDistExp = allKeika.some(k => k.pastDist && parseInt(k.pastDist) === race.distance);
  if (!hasDistExp && race.distance) minusFlags.push('🌀距離未経験');

  // --- 3. 血統適性（上限5pt） ---
  scores.blood = Math.min(calcBloodScore(h.sire, course, race), 5);

  // --- 4. 脚質判定 ---
  const kyakushitsu = calcKyakushitsu(h.keika, race.tosu);

  // --- 5. 脚質×展開（上限7pt） ---
  scores.kyakushitsu = Math.min(calcKyakushitsuScore(kyakushitsu, course, race) * 1.4, 7);
  scores.kyakushitsu = Math.round(scores.kyakushitsu);

  // 枠順不利
  const isSmallCourse = course.type === 'small';
  const isHighPace = race.nigemas >= 3;
  if ((isSmallCourse || isHighPace) && h.waku >= 7) minusFlags.push('🌀枠順不利');

  // --- 6. Rtスコア ---
  scores.rt = calcRtScore(h.keika);

  // --- 7. 重賞実績フラグ（全種類・複数対応） ---
  const jushoFlags = getJushoFlags(allKeika);
  const g1Flags = jushoFlags.filter(f => f.startsWith('🏆')||f.startsWith('🥈')||f.startsWith('🥉')||f.startsWith('🏅')||f.startsWith('🪙'));
  const opFlags = jushoFlags.filter(f => f.startsWith('🔥'));
  g1Flags.forEach(f => plusFlags.push(f));
  opFlags.forEach(f => noteFlags.push(f));

  // --- 8. その他フラグ ---
  if (hasCornerPushup(h.keika)) plusFlags.push('3-4C押し上げ力💪');
  if (hasHighPaceGoodAgari(h.keika)) plusFlags.push('ハイペース末脚💨');
  if (h.weight >= 500 && ['先行','好位差し'].includes(kyakushitsu)) noteFlags.push('🔥大型馬×先行脚質');

  if (h.memo && (h.memo.includes('落馬') || h.memo.includes('妨害') || h.memo.includes('出遅れ') ||
      h.memo.includes('包まれ') || h.memo.includes('競走中止') || h.memo.includes('不利'))) {
    noteFlags.push('🔥前走不利あり');
  }

  if (['win','placed'].includes(courseExp) && scores.dist >= 4) plusFlags.push('コース×距離実績✌️');

  const hasGradedExp = allKeika.some(k => ['G1','G2','G3','JP'].includes(k.grade));
  if (!hasGradedExp) {
    const lowerRentai = allKeika.filter(k => k.rank <= 2 && ['L','OP','3勝','2勝','1勝'].includes(k.grade));
    if (lowerRentai.length >= 3) noteFlags.push('上昇馬⤴️');
  }

  const flashCount = getAgariFlashCount(h.keika);
  if (flashCount >= 4) plusFlags.push('末脚本物🦵');

  const distChange = getDistChangeFlag(h.keika, race.distance);
  if (distChange === 'down') noteFlags.push('🔥距離短縮傾向');
  if (distChange === 'up')   minusFlags.push('🌀距離延長（スタミナ未知数）');

  const highRtRaces = allKeika.filter(k => k.rt != null && k.rt >= 110);
  const highRtOut = highRtRaces.filter(k => k.rank > 3);
  if (highRtRaces.length >= 2 && highRtOut.length >= highRtRaces.length / 2) noteFlags.push('高Rt×着外🔍');

  const prevDist = h.keika && h.keika.length ? parseInt(h.keika[0].pastDist) : null;
  if (prevDist && !isNaN(prevDist) && Math.abs(race.distance - prevDist) >= 600) noteFlags.push('🔄距離変更');

  // 衰えフラグ
  const hasGoodRecord = allKeika.some(k => ['G1','G2','G3'].includes(k.grade) && k.rank <= 3);
  if (hasGoodRecord && h.keika && h.keika.length >= 4) {
    const last4 = h.keika.slice(0, 4).map(k => k.rank);
    const isDecline = last4.every((r, i) => i === 0 || r > last4[i-1]);
    if (isDecline) minusFlags.push('🌀衰え傾向（近走低下）');
  }

  const allFlags = [...plusFlags, ...noteFlags, ...minusFlags];
  const anaScore = Math.min(plusFlags.length * 2 + noteFlags.length, 10);

  let restPenalty = 0;
  if (h.rest === 'long') restPenalty = -2;

  const totalScore = scores.rt + scores.course + scores.kyakushitsu + scores.blood + scores.dist + restPenalty;

  return {
    ...h,
    kyakushitsu,
    scores,
    plusFlags,
    minusFlags,
    noteFlags,
    flags: allFlags,
    anaScore,
    totalScore: Math.max(0, totalScore),
    restPenalty,
    rank: 0,
  };
}

function calcBloodScore(sire, course, race) {
  const dist = race.distance;
  const type = course.type;
  const slope = course.slope;

  const table = {
    hearts:   { wide: 3, mid: 4, small: 4, slopeMod: 1, longMod: 1 },
    roberto:  { wide: 2, mid: 3, small: 5, slopeMod: 2, longMod: 0 },
    deep:     { wide: 5, mid: 3, small: 2, slopeMod: 0, longMod: 0 },
    kizna:    { wide: 4, mid: 4, small: 3, slopeMod: 0, longMod: 0 },
    roadkana: { wide: 3, mid: 3, small: 3, slopeMod: 1, longMod: -1 },
    kitasan:  { wide: 3, mid: 4, small: 3, slopeMod: 1, longMod: 2 },
    other:    { wide: 3, mid: 3, small: 3, slopeMod: 0, longMod: 0 },
  };

  if (!sire || !table[sire]) return 2;
  let s = table[sire][type] || 2;
  if (slope && table[sire].slopeMod) s += table[sire].slopeMod;
  if (dist >= 2400 && table[sire].longMod) s += table[sire].longMod;
  return Math.min(Math.max(s, 0), 7);
}

function calcKyakushitsu(keika, totalTosu) {
  if (!keika || !keika.length) return '不明';
  const latest = keika.slice(0, 3);
  let sumPos = 0; let count = 0;

  latest.forEach(k => {
    const tosu = parseInt(k.tosu) || 16;

    // 入力されているコーナー順位を全部集める（後ろ優先で平均）
    const corners = [k.c4, k.c3, k.c2, k.c1]
      .map(c => (c && c !== '—' && c !== '') ? parseInt(c) : NaN)
      .filter(n => !isNaN(n) && n > 0);

    if (corners.length === 0) return;

    // 後半コーナー（4C→3C）を優先、なければ前半も使う
    // 一番後ろのコーナー（最終コーナーに近い方）を代表値にする
    const rep = corners[0]; // 後ろから並べてるので[0]が最終コーナーに近い
    sumPos += rep / tosu;
    count++;
  });

  if (!count) return '不明';
  const avg = sumPos / count;

  if (avg <= 0.12) return '逃げ';
  if (avg <= 0.28) return '先行';
  if (avg <= 0.50) return '好位差し';
  if (avg <= 0.72) return '差し';
  return '追込';
}

function calcKyakushitsuScore(kyakushitsu, course, race) {
  const straight = course.straight;
  const isSmall = course.type === 'small';
  const pace = race.nigemas >= 3 ? 'high' : race.nigemas === 0 ? 'slow' : 'mid';

  const scoreMap = {
    逃げ:    { slow: 5, mid: 4, high: 2 },
    先行:    { slow: 5, mid: 4, high: 3 },
    好位差し:{ slow: 4, mid: 4, high: 4 },
    差し:    { slow: 2, mid: 3, high: 4 },
    追込:    { slow: 1, mid: 2, high: 3 },
    不明:    { slow: 2, mid: 2, high: 2 },
  };

  let score = scoreMap[kyakushitsu]?.[pace] || 2;

  // 直線補正
  if (straight <= 320 && ['差し','追込'].includes(kyakushitsu)) score -= 2;
  if (straight >= 500 && ['差し','追込'].includes(kyakushitsu)) score += 1;
  if (isSmall && ['差し','追込'].includes(kyakushitsu)) score -= 1;

  return Math.min(Math.max(score, 0), 5);
}

function hasCornerPushup(keika) {
  if (!keika) return false;
  return keika.some(k => {
    const c3 = parseInt(k.c3), c4 = parseInt(k.c4);
    if (isNaN(c3)||isNaN(c4)||c3===0||c4===0) return false;
    return c4 < c3 && (c3 - c4) >= 2;
  });
}

function hasHighPaceGoodAgari(keika) {
  if (!keika) return false;
  return keika.some(k => {
    if (k.pace !== 'high') return false;
    if (k.agari == null) return false;
    return k.agari <= 34.5 || (k.agariAll != null && k.agariAll > 0 && k.agari <= k.agariAll - 0.5);
  });
}

                  <td style="color:${k.pace==='high'?'var(--red)':k.pace==='slow'?'var(--green)':k.pace==='unknown'?'var(--text3)':'var(--accent)'}">${isOverseas?'—':k.pace==='high'?'H':k.pace==='slow'?'S':k.pace==='unknown'?'？':'M'}</td>
                </tr>`;
              }).join('')}
            </tbody>
          </table>
        </div>` : ''}

      ${h.jisseki && h.jisseki.length ? `
        <div style="margin-top:8px;">
          <button onclick="this.nextElementSibling.style.display=this.nextElementSibling.style.display==='none'?'block':'none';this.textContent=this.textContent.includes('▶')?'▼ 過去実績（${h.jisseki.length}件）':'▶ 過去実績（${h.jisseki.length}件）';"
            style="font-size:10px;color:var(--text3);font-weight:700;letter-spacing:1px;background:none;border:none;cursor:pointer;padding:4px 0;">
            ▶ 過去実績（${h.jisseki.length}件）
          </button>
          <div style="display:none;">
            <table class="keika-table" style="margin-top:4px;">
              <thead><tr><th>日付</th><th>レース名</th><th>場/距</th><th>G</th><th>着</th></tr></thead>
              <tbody>
                ${h.jisseki.map(j=>{
                  const ci = COURSE_DATA[j.pastCourse];
                  const cLabel = ci ? ci.name : (j.pastCourse||'—');
                  const dLabel = j.pastDist ? j.pastDist+'m' : '—';
                  const dateLabel = j.raceDate ? j.raceDate.slice(5) : '—';
                  return `<tr>
                    <td style="font-size:9px;color:var(--text3)">${dateLabel}</td>
                    <td style="font-size:10px;color:var(--text2);max-width:70px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${j.raceName||'—'}</td>
                    <td style="font-size:10px;color:var(--text3)">${cLabel}<br>${dLabel}</td>
                    <td><span class="badge badge-rank" style="font-size:9px;padding:1px 5px;">${j.grade||'—'}</span></td>
                    <td><span class="rank-circle ${j.rank<=3?'rank-'+j.rank:'rank-other'}">${j.rank}</span></td>
                  </tr>`;
                }).join('')}
              </tbody>
            </table>
          </div>
        </div>` : ''}
    </div>`;
}

// ===== RENDER TENKAI =====
function renderTenkai(analyzed, race, course) {
  const pace = race.nigemas >= 3 ? 'ハイペース' : race.nigemas === 0 ? 'スローペース' : race.nigemas === 1 ? 'ミドル〜スロー' : 'ミドル';

  const nigeme = analyzed.filter(h => h.kyakushitsu === '逃げ');
  const senko = analyzed.filter(h => h.kyakushitsu === '先行');
  const sashi = analyzed.filter(h => ['好位差し','差し'].includes(h.kyakushitsu));
  const oikomi = analyzed.filter(h => h.kyakushitsu === '追込');
  const fumeimei = analyzed.filter(h => h.kyakushitsu === '不明');

  const advantaged = race.nigemas >= 3
    ? ['好位差し','差し']
    : (course.type === 'small' ? ['逃げ','先行'] : ['先行','好位差し']);

  const courseName = course.name || '';

  const html = `
    <div class="section">
      <div class="section-title">🌀 展開予想</div>
      <div class="flow-row">
        <span style="color:var(--text3);font-size:11px;">逃げ馬</span>
        <span class="flow-chip" style="background:rgba(224,82,82,0.2);color:#f08080;">${race.nigemas}頭</span>
        <span class="flow-arrow">→</span>
        <span class="flow-chip" style="background:rgba(201,168,76,0.2);color:var(--accent2);font-size:13px;font-weight:900;">${pace}</span>
        <span class="flow-arrow">→</span>
        <span style="font-size:11px;color:var(--green);">有利：${advantaged.join('・')}</span>
      </div>

      <div style="margin-top:10px;font-size:11px;color:var(--text2);line-height:1.8;">
        📍 ${courseName}（直線 ${course.straight}m ${course.slope?'/ 急坂あり':''}）<br>
        ${course.type==='small'?'⚠️ 小回りコース。直線短く差し・追込は不利。':
          course.type==='wide'?'✅ 直線長い。末脚型にもチャンスあり。':
          '📋 中距離コース。バランス型が有利。'}
        ${race.kaibaku <= 2 ? '<br>🟢 開幕直後 → 内枠・先行が有利になりやすい。' :
          race.kaibaku >= 9 ? '<br>🟡 馬場荒れ気味 → パワー型・外枠有利になることも。' : ''}
      </div>
    </div>

    <div class="section">
      <div class="section-title">🐴 脚質別グループ</div>

      ${[
        { label: '逃げ', list: nigeme, color: '#e05252', bg: 'rgba(224,82,82,0.1)' },
        { label: '先行', list: senko, color: '#c9a84c', bg: 'rgba(201,168,76,0.1)' },
        { label: '好位差し・差し', list: sashi, color: '#5299e0', bg: 'rgba(82,153,224,0.1)' },
        { label: '追込', list: oikomi, color: '#9b72cf', bg: 'rgba(155,114,207,0.1)' },
        { label: '脚質不明', list: fumeimei, color: 'var(--text3)', bg: 'rgba(90,90,114,0.1)' },
      ].filter(g => g.list.length).map(g => `
        <div style="background:${g.bg};border:1px solid ${g.color}33;border-radius:8px;padding:10px;margin-bottom:8px;">
          <div style="font-size:10px;color:${g.color};font-weight:700;letter-spacing:1px;margin-bottom:6px;">${g.label}</div>
          ${g.list.map(h=>`
            <div style="display:flex;align-items:center;gap:8px;margin-bottom:4px;">
              <span style="font-size:12px;font-weight:700;">${h.umaban?h.umaban+'番 ':''}${h.name}</span>
              ${h.flags.length>=2?'<span class="badge badge-ana" style="font-size:9px;">⭐穴</span>':''}
              <span style="font-size:10px;color:var(--text3);margin-left:auto;">${h.totalScore}pt</span>
            </div>`).join('')}
        </div>`).join('')}
    </div>

    <div class="section">
      <div class="section-title">⭐ 穴馬候補</div>
      ${analyzed.filter(h=>h.flags.length>=2).length ?
        analyzed.filter(h=>h.flags.length>=2).map(h=>`
          <div style="background:rgba(255,215,0,0.06);border:1px solid rgba(255,215,0,0.25);border-radius:8px;padding:12px;margin-bottom:8px;">
            <div style="font-weight:700;font-size:14px;margin-bottom:6px;">
              ${h.umaban?h.umaban+'番 ':''}${h.name}

            </div>

              ${(h.noteFlags||[]).map(f=>`<span style="font-size:10px;padding:2px 8px;background:rgba(201,168,76,0.15);border:1px solid rgba(201,168,76,0.4);border-radius:4px;color:var(--accent2);font-weight:700;">${f}</span>`).join('')}

          </div>`).join('')
        : '<div style="color:var(--text3);font-size:12px;text-align:center;padding:20px;">条件を満たす穴馬候補は今のところいないわ</div>'}
    </div>
  `;

  document.getElementById('tenkai-content').innerHTML = html;
}

// ===== SAVE / LOAD =====
function saveRace() {
  const key = 'keiba_' + Date.now();
  const now = new Date();
  const savedAt = now.toLocaleDateString('ja-JP') + ' ' +
    String(now.getHours()).padStart(2,'0') + ':' +
    String(now.getMinutes()).padStart(2,'0');
  const data = {
    key,
    savedAt,
    raceName: document.getElementById('race-name').value || '無名レース',
    course: document.getElementById('race-course').value,
    distance: document.getElementById('race-distance').value,
    grade: document.getElementById('race-grade').value,
    horses: JSON.parse(JSON.stringify(horses)),
    raceForm: {
      surface: document.getElementById('race-surface').value,
      baba: document.getElementById('race-baba').value,
      cushion: document.getElementById('race-cushion').value,
      kaibaku: document.getElementById('race-kaibaku').value,
      nigemas: document.getElementById('race-nigemas').value,
      tosu: document.getElementById('race-tosu').value,
    }
  };

  const saved = getSaved();
  saved.push(data);
  localStorage.setItem('keiba_saved', JSON.stringify(saved));
  showToast('保存したわ！💾');
  renderSaved();
}

function getSaved() {
  try { return JSON.parse(localStorage.getItem('keiba_saved')) || []; }
  catch(e) { return []; }
}

function renderSaved() {
  const container = document.getElementById('saved-list');
  const saved = getSaved();
  if (!saved.length) {
    container.innerHTML = '<div class="empty-state"><div class="empty-state-icon">💾</div><div class="empty-state-text">まだ保存したレースがないわ</div></div>';
    return;
  }

  // 新しい順に並び替え
  const sorted = [...saved].map((s,i) => ({...s, _origIdx: i})).reverse();

  container.innerHTML = sorted.map((s) => {
    const i = s._origIdx;
    return `
    <div class="saved-race-item">
      <div class="saved-race-info">
        <div class="saved-race-name">${s.raceName}</div>
        <div class="saved-race-meta">${COURSE_DATA[s.course]?.name||s.course||'—'} ${s.distance||'—'}m ${s.grade||''} | ${s.horses.length}頭</div>
        <div style="font-size:10px;color:var(--accent);margin-top:2px;">💾 ${s.savedAt}</div>
      </div>
      <div class="btn-group">
        <button class="btn btn-secondary btn-sm" onclick="loadRace(${i})">読込</button>
        <button class="btn btn-danger btn-sm" onclick="deleteSaved(${i})">削除</button>
      </div>
    </div>`;
  }).join('');
}

function loadRace(i) {
  const saved = getSaved();
  const s = saved[i];
  if (!s) return;

  document.getElementById('race-name').value = s.raceName || '';
  document.getElementById('race-course').value = s.course || '';
  document.getElementById('race-distance').value = s.distance || '';
  document.getElementById('race-grade').value = s.grade || '';
  if (s.raceForm) {
    document.getElementById('race-surface').value = s.raceForm.surface || 'turf';
    document.getElementById('race-baba').value = s.raceForm.baba || 'good';
    document.getElementById('race-cushion').value = s.raceForm.cushion || '';
    document.getElementById('race-kaibaku').value = s.raceForm.kaibaku || '5';
    document.getElementById('race-nigemas').value = s.raceForm.nigemas || '1';
    document.getElementById('race-tosu').value = s.raceForm.tosu || '16';
  }
  horses = s.horses || [];
  renderHorseList();
  switchTab('input');
  showToast(`「${s.raceName}」を読み込んだわ！`);
}

function deleteSaved(i) {
  const saved = getSaved();
  saved.splice(i, 1);
  localStorage.setItem('keiba_saved', JSON.stringify(saved));
  renderSaved();
  showToast('削除したわ');
}

function clearAll() {
  if (!confirm('保存済みレースを全部消すわよ？')) return;
  localStorage.removeItem('keiba_saved');
  renderSaved();
  showToast('全削除したわ');
}

// ===== JSON EXPORT =====
function exportJSON() {
  const saved = getSaved();
  if (!saved.length) {
    showToast('保存済みレースがないわ！先に保存してね');
    return;
  }
  const exportData = {
    app: 'Nami競馬予想システム',
    exportedAt: new Date().toLocaleString('ja-JP'),
    version: '1.0',
    races: saved
  };
  const json = JSON.stringify(exportData, null, 2);
  const blob = new Blob([json], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  const date = new Date().toISOString().slice(0,10).replace(/-/g,'');
  a.href = url;
  a.download = `keiba_yoso_${date}.json`;
  a.click();
  URL.revokeObjectURL(url);
  showToast(`${saved.length}件のレースを書き出したわ！💾`);
}

// ===== JSON IMPORT =====
function importJSON(event) {
  const file = event.target.files[0];
  if (!file) return;

  const resultEl = document.getElementById('import-result');
  resultEl.textContent = '読み込み中...';
  resultEl.style.color = 'var(--text3)';

  const reader = new FileReader();
  reader.onload = (e) => {
    try {
      const data = JSON.parse(e.target.result);

      // バリデーション
      if (!data.races || !Array.isArray(data.races)) {
        throw new Error('形式が違うわ。このアプリで書き出したファイルを使ってね');
      }

      const existing = getSaved();
      // 重複チェック（keyで判定）
      const existingKeys = new Set(existing.map(r => r.key));
      const newRaces = data.races.filter(r => !existingKeys.has(r.key));
      const dupCount = data.races.length - newRaces.length;

      const merged = [...existing, ...newRaces];
      localStorage.setItem('keiba_saved', JSON.stringify(merged));

      renderSaved();

      let msg = `✅ ${newRaces.length}件を読み込んだわ！`;
      if (dupCount > 0) msg += `（重複${dupCount}件はスキップ）`;
      resultEl.textContent = msg;
      resultEl.style.color = 'var(--green)';
      showToast(`${newRaces.length}件追加したわ！`);
    } catch(err) {
      resultEl.textContent = `❌ エラー：${err.message}`;
      resultEl.style.color = 'var(--red)';
    }
    // input リセット（同じファイルを再度読めるように）
    event.target.value = '';
  };
  reader.readAsText(file, 'UTF-8');
}

// ===== HORSE DB LIST =====
function renderHorseDBList() {
  const container = document.getElementById('horsedb-list');
  if (!container) return;
  const names = Object.keys(horseDB);
  if (!names.length) {
    container.innerHTML = '<div style="font-size:12px;color:var(--text3);text-align:center;padding:16px;">馬データがまだないわ</div>';
    return;
  }
  container.innerHTML = names.map(name => {
    const h = horseDB[name];
    return `
    <div style="background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:10px;margin-bottom:6px;display:flex;align-items:center;justify-content:space-between;">
      <div>
        <div style="font-weight:700;font-size:13px;">${name}</div>
        <div style="font-size:10px;color:var(--text3);">${(h.sex||'')}${h.age}歳 | ${h.keika?h.keika.length+'走分':''}${h.jisseki&&h.jisseki.length?'+実績'+h.jisseki.length:''}</div>
      </div>
      <button class="btn btn-danger btn-sm" onclick="deleteHorseFromDB('${name}')">削除</button>
    </div>`;
  }).join('');
}

function deleteHorseFromDB(name) {
  if (!confirm(`「${name}」を馬データベースから削除するわよ？`)) return;
  delete horseDB[name];
  renderHorseDBList();
  showToast(`${name}を削除したわ`);
}
